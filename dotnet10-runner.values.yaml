githubConfigUrl: "https://github.com/Kofoten"
githubConfigSecret: "arc-github-app-secret"
runnerScaleSetName: "dotnet10-arc-runner"

template:
  spec:
    containers:
      - name: runner
        image: local/dotnet10-runner:v2
        imagePullPolicy: IfNotPresent
        command: ["/home/runner/run.sh"]
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
